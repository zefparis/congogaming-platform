<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="adiGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#013CFF"/>
      <stop offset="100%" stop-color="#FF710A"/>
    </linearGradient>
    <linearGradient id="adiGradR" x1="80" y1="0" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF710A"/>
      <stop offset="100%" stop-color="#013CFF"/>
    </linearGradient>
  </defs>
  <!-- Outer diamond / losange -->
  <polygon points="40,2 78,40 40,78 2,40" fill="url(#adiGrad)"/>
  <!-- Inner prediction arrow (upward triangle = growth/predict) -->
  <polygon points="40,19 58,54 22,54" fill="white" opacity="0.94"/>
  <!-- Center notch — gives pin/location-drop silhouette -->
  <rect x="36.5" y="42" width="7" height="11" rx="2.5" fill="#010820"/>
  <!-- Small highlight dot at arrow tip -->
  <circle cx="40" cy="23" r="2.5" fill="white" opacity="0.6"/>
</svg>
